    - data:
        code: "import json\n\ndef pick_segments(segments, start, end):\n    out =\
          \ []\n    for s in segments:\n        ss = float(s.get(\"start\", 0) or\
          \ 0)\n        ee = float(s.get(\"end\", 0) or 0)\n        t = (s.get(\"\
          text\") or \"\").strip()\n        if not t or ee <= ss:\n            continue\n\
          \        if ee <= start or ss >= end:\n            continue\n        out.append({\n\
          \            \"start\": round(ss, 2),\n            \"end\": round(ee, 2),\n\
          \            \"text\": t\n        })\n    return out\n\ndef main(http_body:\
          \ str, planner_json: str) -> dict:\n    obj = json.loads((http_body or \"\
          \").strip())\n    plan = json.loads((planner_json or \"\").strip())\n\n\
          \    duration = float(obj.get(\"duration\", 0) or 0)\n    segments = obj.get(\"\
          segments\", [])\n\n    cut1 = float(plan.get(\"cut_1_end\", duration / 3)\
          \ or duration / 3)\n    cut2 = float(plan.get(\"cut_2_end\", duration *\
          \ 2 / 3) or duration * 2 / 3)\n\n    cut1 = max(0.0, min(cut1, duration))\n\
          \    cut2 = max(cut1, min(cut2, duration))\n\n    p1 = pick_segments(segments,\
          \ 0.0, cut1)\n    p2 = pick_segments(segments, cut1, cut2)\n    p3 = pick_segments(segments,\
          \ cut2, duration)\n\n    return {\n    \"part_1_text\": \"\\n\".join(x[\"\
          text\"] for x in p1),\n    \"part_1_segments_json\": json.dumps(p1, ensure_ascii=False),\n\
          \n    \"part_2_text\": \"\\n\".join(x[\"text\"] for x in p2),\n    \"part_2_segments_json\"\
          : json.dumps(p2, ensure_ascii=False),\n\n    \"part_3_text\": \"\\n\".join(x[\"\
          text\"] for x in p3),\n    \"part_3_segments_json\": json.dumps(p3, ensure_ascii=False),\n\
          }\n\n"
        code_language: python3
