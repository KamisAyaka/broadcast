          text: "你是爆点提取子Agent。只允许使用输入的这部分文本，禁止假设其他内容。\n\n输入：\n- part_text\n- segments_json（数组，含\
            \ start/end/text）\n\n任务：\n1. 提取 1-2 个候选爆点片段。\n2. 每个片段必须能在 segments_json\
            \ 中定位，start/end 必须来自该分段范围。\n3. 时长建议 30-60 秒。\n4. 输出严格 JSON 数组，不要解释。\n\n\
            输出格式：\n[\n  {\n    \"start\": 123.45,\n    \"end\": 156.78,\n    \"score\"\
            : 0.88,\n    \"reason\": \"一句话\",\n    \"title_seed\": \"一句标题种子\"\n  }\n\
            ]\n"
        - id: 92f03fb0-317a-47f7-bd88-a588c6165020
          role: user
          text: '- part_text : {{#1775374945020.part_1_text#}}

            - segments_json: {{#1775374945020.part_1_segments_json#}}'
        selected: false
        structured_output_enabled: false
        title: 爆点agent--001
        type: llm
        vision:
          enabled: false
      height: 116
      id: '1775284507326'
      position:
