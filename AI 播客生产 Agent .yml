      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\nimport re\n\ndef parse_json_array(s: str):\n    s = (s\
          \ or \"\").strip()\n    s = re.sub(r\"^```json\\s*|\\s*```$\", \"\", s,\
          \ flags=re.I | re.S).strip()\n    if not s:\n        return []\n    try:\n\
          \        v = json.loads(s)\n        return v if isinstance(v, list) else\
          \ []\n    except:\n        m = re.search(r\"\\[.*\\]\", s, flags=re.S)\n\
          \        if not m:\n            return []\n        v = json.loads(m.group(0))\n\
          \        return v if isinstance(v, list) else []\n\ndef collect_text_by_range(segments,\
          \ start, end):\n    parts = []\n    for s in segments:\n        ss = float(s.get(\"\
          start\", 0) or 0)\n        ee = float(s.get(\"end\", 0) or 0)\n        t\
          \ = (s.get(\"text\") or \"\").strip()\n        if not t or ee <= ss:\n \
          \           continue\n        if ee <= start or ss >= end:\n           \
          \ continue\n        parts.append(t)\n    return \"\\n\".join(parts).strip()\n\
          \ndef overlap_ratio(a1, a2, b1, b2):\n    inter = max(0, min(a2, b2) - max(a1,\
          \ b1))\n    la = max(1e-6, a2 - a1)\n    lb = max(1e-6, b2 - b1)\n    return\
          \ max(inter / la, inter / lb)\n\ndef main(http_body: str, a1_json: str,\
          \ a2_json: str, a3_json: str) -> dict:\n    transcript = json.loads((http_body\
          \ or \"\").strip())\n    segments = transcript.get(\"segments\", [])\n \
          \   duration = float(transcript.get(\"duration\", 0) or 0)\n\n    raw =\
          \ parse_json_array(a1_json) + parse_json_array(a2_json) + parse_json_array(a3_json)\n\
          \n    # 清洗\n    items = []\n    for c in raw:\n        try:\n          \
          \  s = round(float(c.get(\"start\", 0)), 2)\n            e = round(float(c.get(\"\
          end\", 0)), 2)\n            score = float(c.get(\"score\", 0) or 0)\n  \
          \      except:\n            continue\n        if e <= s:\n            continue\n\
          \        if s < 0 or (duration > 0 and e > duration + 0.01):\n         \
          \   continue\n\n        items.append({\n            \"start\": s,\n    \
          \        \"end\": e,\n            \"score\": score,\n            \"reason\"\
          : (c.get(\"reason\") or \"\").strip(),\n            \"title_seed\": (c.get(\"\
          title_seed\") or \"\").strip(),\n        })\n\n    # 排序 + 去重\n    items.sort(key=lambda\
          \ x: x[\"score\"], reverse=True)\n    dedup = []\n    for c in items:\n\
          \        if any(overlap_ratio(c[\"start\"], c[\"end\"], d[\"start\"], d[\"\
          end\"]) > 0.6 for d in dedup):\n            continue\n        dedup.append(c)\n\
          \n    # 取前6并补全文本\n    top6 = dedup[:6]\n    candidates = []\n    for i,\
          \ c in enumerate(top6, 1):\n        clip_text = collect_text_by_range(segments,\
          \ c[\"start\"], c[\"end\"])\n        candidates.append({\n            \"\
          rank_seed\": i,\n            \"start\": c[\"start\"],\n            \"end\"\
          : c[\"end\"],\n            \"score\": c[\"score\"],\n            \"reason\"\
          : c[\"reason\"],\n            \"title_seed\": c[\"title_seed\"],\n     \
          \       \"clip_text\": clip_text\n        })\n\n    return {\n        \"\
          candidates_json\": json.dumps(candidates, ensure_ascii=False),\n       \
          \ \"candidate_count\": len(candidates)\n    }\n"
        code_language: python3
        desc: 汇总三个agent得出的结论给下一个大模型去看
        outputs:
